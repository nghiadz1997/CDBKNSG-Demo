<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indoor Nav PRO - Advanced Smart Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes dash { to { stroke-dashoffset: -40; } }
        @keyframes pulse-ring {
            0% { transform: scale(0.6); opacity: 1; }
            50% { opacity: 0.5; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .route-line { 
            stroke-dasharray: 12, 6; 
            animation: dash 1.2s linear infinite; 
            filter: drop-shadow(0 0 6px rgba(249, 115, 22, 0.8));
        }

        html, body {
            overflow: hidden;
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            touch-action: none;
        }

        #viewport {
            overflow: hidden;
            width: 100%; height: 100%;
            cursor: grab;
            position: relative;
            touch-action: none;
            transition: background-color 0.3s ease;
        }
        #viewport:active { cursor: grabbing; }

        /* Dimming effects for non-active elements */
        .dimmed-map { filter: saturate(0.3) opacity(0.4); transition: filter 0.4s ease, opacity 0.4s ease; }
        .dark-mode .dimmed-map { filter: saturate(0.2) opacity(0.2) brightness(0.5); }

        .node-ui { 
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; 
            cursor: pointer; 
            pointer-events: auto;
        }
        .dragging { opacity: 0.5 !important; z-index: 1000 !important; transition: none !important; }

        /* Pulse effects for location icons */
        .current-loc-pulse {
            position: relative;
        }
        .current-loc-pulse::before {
            content: '';
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: inherit;
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            z-index: -1;
        }

        #map-container {
            width: 1200px; height: 800px;
            position: relative; transform-origin: center center;
            will-change: transform;
            flex-shrink: 0;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Clean Map Typography - No bulky borders */
        .map-label {
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 800;
            font-size: 8px;
            color: #1e293b;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            white-space: nowrap;
        }
        .dark-mode .map-label {
            color: #f1f5f9;
            text-shadow: -1px -1px 0 #0f172a, 1px -1px 0 #0f172a, -1px 1px 0 #0f172a, 1px 1px 0 #0f172a;
        }

        /* Standardized Room Categories Design */
        .cat-classroom { background-color: #22c55e !important; } /* Xanh lá */
        .cat-office { background-color: #a855f7 !important; }    /* Tím */
        .cat-service { background-color: #eab308 !important; }   /* Vàng */
        .cat-emergency { background-color: #ef4444 !important; } /* Đỏ */

        .sidebar-panel {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark-mode ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-800 font-sans transition-colors duration-300">

<div id="msg-box" class="hidden px-6 py-3 rounded-full text-xs font-bold shadow-2xl fixed top-6 left-1/2 -translate-x-1/2 z-[1000] text-white transition-all"></div>

<div class="flex h-screen w-screen relative overflow-hidden bg-slate-200 dark:bg-slate-950" id="app-root">
    
    <!-- BACKDROP COVER FOR SIDEBAR (Mobile) -->
    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[190] transition-opacity duration-300"></div>

    <!-- FLOATING SEARCH BAR & HAMBURGER TRIGGER -->
    <div class="absolute top-4 left-4 right-4 md:left-6 md:right-auto md:w-96 z-[140] flex flex-col gap-2 pointer-events-none">
        <div class="w-full bg-white/95 dark:bg-slate-900/95 backdrop-blur-md shadow-xl rounded-2xl p-2.5 flex items-center gap-2 border border-slate-100 dark:border-slate-800 pointer-events-auto transition-all">
            <button id="menu-trigger-btn" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl text-slate-600 dark:text-slate-300 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            
            <div class="flex-1 relative">
                <input id="smart-search-input" type="text" placeholder="Tìm phòng học, khoa, thư viện..." class="w-full pl-1 pr-6 py-1 bg-transparent outline-none text-xs font-bold text-slate-800 dark:text-slate-100 placeholder-slate-400">
                <button id="clear-search-btn" class="hidden absolute right-1 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">✕</button>
            </div>
            
            <div class="w-px h-6 bg-slate-200 dark:bg-slate-700"></div>
            
            <!-- QR SCAN CHECK-IN TRIGGER -->
            <button id="qr-mock-btn" class="p-2 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-950/50 rounded-xl transition-colors" title="Check-in vị trí hiện tại">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </button>
        </div>

        <!-- SEARCH AUTO SUGGESTIONS -->
        <div id="search-suggestions" class="hidden w-full max-h-60 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md shadow-2xl rounded-2xl border border-slate-100 dark:border-slate-800 overflow-y-auto pointer-events-auto"></div>
    </div>

    <!-- MAIN SIDEBAR PANEL (Collapsible by default) -->
    <aside id="main-sidebar" class="sidebar-panel fixed inset-y-0 left-0 w-80 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col shadow-2xl -translate-x-full">
        <div class="p-5 border-b border-slate-100 dark:border-slate-800 bg-gradient-to-br from-indigo-700 to-violet-900 text-white flex justify-between items-center">
            <div>
                <h1 class="font-bold text-base leading-tight">Indoor Nav PRO</h1>
                <p class="text-[9px] opacity-70 uppercase tracking-widest text-orange-300 font-bold">Advanced Smart Core v8.2</p>
            </div>
            <button id="close-sidebar-btn" class="p-1 text-white/60 hover:text-white rounded-lg hover:bg-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- CURRENT LOCATION SELECTOR -->
            <div class="bg-slate-50 dark:bg-slate-800/60 p-3 rounded-2xl border border-slate-100 dark:border-slate-800 space-y-1.5">
                <span class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-wider">📍 Đang check-in tại</span>
                <select id="qr-location-selector" class="w-full p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-black outline-none text-slate-800 dark:text-slate-100"></select>
            </div>

            <!-- ADMINISTRATIVE CONTROLS -->
            <div id="admin-tools" class="hidden space-y-3 bg-indigo-50/40 dark:bg-indigo-950/20 p-3 rounded-2xl border border-indigo-100 dark:border-indigo-900/40">
                <div class="flex items-center justify-between border-b border-indigo-100 dark:border-indigo-900/40 pb-2">
                    <span class="text-[9px] font-bold text-indigo-500 uppercase">Quản trị Hệ thống</span>
                    <button id="btn-logout" class="text-red-500 text-xs font-bold">Thoát</button>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button data-mode="select" class="tool-btn p-2 rounded-xl border border-transparent bg-indigo-600 text-white text-[9px] font-black uppercase">Kéo</button>
                    <button data-mode="add" class="tool-btn p-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-[9px] font-black uppercase">Thêm</button>
                    <button data-mode="connect" class="tool-btn p-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-[9px] font-black uppercase">Nối</button>
                </div>
                <button id="btn-save-all" class="w-full py-2 bg-indigo-600 text-white rounded-xl text-xs font-black shadow-lg hover:bg-indigo-700 transition-all">LƯU THAY ĐỔI</button>
            </div>

            <!-- SMART ROUTING PREFERENCES -->
            <div class="space-y-1.5">
                <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Tùy chọn di chuyển</span>
                <div class="grid grid-cols-2 gap-2 bg-slate-50 dark:bg-slate-800/40 p-1 rounded-xl border border-slate-100 dark:border-slate-800">
                    <button id="pref-shortest" class="pref-btn py-1.5 text-[9px] font-black uppercase rounded-lg transition-all bg-white dark:bg-slate-800 text-indigo-600 shadow-sm" data-pref="shortest">Gần Nhất</button>
                    <button id="pref-elevator" class="pref-btn py-1.5 text-[9px] font-black uppercase rounded-lg transition-all text-slate-500" data-pref="elevator">Ưu tiên 🛗</button>
                </div>
            </div>

            <!-- ACCORDION MAP CATEGORIES / FLOORS -->
            <div class="space-y-1.5">
                <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Danh mục sơ đồ</span>
                <div id="floor-accordion-container" class="space-y-1.5"></div>
            </div>

            <!-- MANUAL DIRECTION SELECTORS -->
            <div class="space-y-3 pt-4 border-t border-slate-100 dark:border-slate-800">
                <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Tìm đường thủ công</span>
                <div class="space-y-2">
                    <select id="select-start" class="w-full p-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-xl text-xs font-bold outline-none"></select>
                    <select id="select-end" class="w-full p-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-xl text-xs font-bold outline-none"></select>
                    <div class="flex gap-2">
                        <button id="btn-find-path" class="flex-1 bg-orange-500 text-white py-2 rounded-xl text-xs font-bold shadow-lg transition-all">TÌM ĐƯỜNG</button>
                        <button id="btn-clear-path" class="hidden p-2 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-xl border dark:border-slate-700">✕</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- SIDEBAR FOOTER -->
        <div class="p-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 text-[9px] text-slate-400 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span id="sync-status" class="w-2 h-2 rounded-full bg-yellow-500"></span>
                <span id="sync-text" class="font-bold uppercase text-[8px]">Connecting</span>
            </div>
            <button id="toggle-dark-mode" class="px-2 py-1 bg-slate-200 dark:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-400 font-bold text-[8px]">DARK MODE</button>
            <span id="secret-login-trigger" class="font-bold uppercase text-[8px] cursor-pointer">v8.2 CLOUD</span>
        </div>
    </aside>

    <!-- VIEWPORT MAIN ENGINE -->
    <main id="viewport" class="flex-1 bg-slate-100 dark:bg-slate-950">
        <!-- FLOATING CONTROL SYSTEM -->
        <div class="absolute right-4 top-4 z-[140] flex flex-col gap-2">
            <button id="btn-rotate" class="p-2.5 bg-white/95 dark:bg-slate-900/95 shadow-lg rounded-xl border border-slate-100 dark:border-slate-800 text-slate-600 dark:text-slate-300 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
            </button>
            <button id="btn-recenter" class="p-2.5 bg-white/95 dark:bg-slate-900/95 shadow-lg rounded-xl border border-slate-100 dark:border-slate-800 text-slate-600 dark:text-slate-300 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>

        <!-- GRAPHIC ENGINE CONTAINER -->
        <div id="map-container" class="bg-white dark:bg-slate-900 shadow-2xl rounded-xl overflow-visible">
            <img id="map-image" src="" alt="Sơ đồ tòa nhà" class="w-full h-full object-fill rounded-xl pointer-events-none transition-all duration-300">
            <svg id="svg-layer" class="absolute inset-0 w-full h-full pointer-events-none overflow-visible"></svg>
            <div id="nodes-layer" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <!-- ROUTE SUMMARY BOTOM CARD -->
        <div id="route-summary-card" class="hidden absolute bottom-6 left-1/2 -translate-x-1/2 w-11/12 max-w-sm bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border border-slate-100/50 dark:border-slate-800 shadow-2xl p-4 rounded-2xl z-[150] flex flex-col gap-2 transition-all duration-300">
            <div class="flex items-center justify-between border-b dark:border-slate-800 pb-2">
                <div class="flex items-center gap-2">
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                    </span>
                    <span class="text-[9px] font-black uppercase text-orange-500 tracking-wider">Đang chỉ đường</span>
                </div>
                <button id="btn-cancel-route-fast" class="text-slate-400 hover:text-red-500 text-[10px] font-black uppercase">✕ Hủy</button>
            </div>
            <div class="flex items-center justify-between gap-4">
                <div class="min-w-0">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Điểm đến</p>
                    <p id="route-summary-dest" class="text-xs font-black text-slate-800 dark:text-slate-100 truncate">PHÒNG A0.11</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Ước lượng</p>
                    <p id="route-summary-steps" class="text-xs font-black text-indigo-600 dark:text-indigo-400 whitespace-nowrap">~45 bước</p>
                </div>
            </div>
            <button id="btn-route-switch-floor-fast" class="hidden w-full py-1.5 mt-1 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 rounded-lg text-[9px] font-black uppercase">Chuyển sang tầng tiếp theo</button>
        </div>

        <!-- QUICK ACTION FLOATING BOTTOM BAR -->
        <div id="quick-actions-bar" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-[130] w-11/12 max-w-sm bg-white/90 dark:bg-slate-900/90 backdrop-blur-md shadow-2xl rounded-2xl p-1.5 flex justify-around items-center border border-white/20 transition-all duration-300">
            <button class="quick-action-btn flex flex-col items-center p-1.5 text-slate-600 dark:text-slate-400 hover:text-indigo-600" data-type="wc">
                <span class="text-base">🚻</span><span class="text-[8px] font-bold uppercase">WC</span>
            </button>
            <button class="quick-action-btn flex flex-col items-center p-1.5 text-slate-600 dark:text-slate-400 hover:text-indigo-600" data-type="canteen">
                <span class="text-base">☕</span><span class="text-[8px] font-bold uppercase">Căn tin</span>
            </button>
            <button class="quick-action-btn flex flex-col items-center p-1.5 text-slate-600 dark:text-slate-400 hover:text-indigo-600" data-type="library">
                <span class="text-base">📚</span><span class="text-[8px] font-bold uppercase">T.Viện</span>
            </button>
            <button class="quick-action-btn flex flex-col items-center p-1.5 text-slate-600 dark:text-slate-400 hover:text-indigo-600" data-type="elevator">
                <span class="text-base">🛗</span><span class="text-[8px] font-bold uppercase">Thang máy</span>
            </button>
            <button id="quick-recenter-btn" class="flex flex-col items-center p-1.5 text-slate-600 dark:text-slate-400 hover:text-indigo-600">
                <span class="text-base">📍</span><span class="text-[8px] font-bold uppercase">Mặc định</span>
            </button>
        </div>

        <!-- COMPASS/ANGLE FLOATING INDICATOR -->
        <div id="next-floor-prompt" class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 bg-white dark:bg-slate-900 border border-indigo-100 dark:border-indigo-900 shadow-2xl p-3 rounded-2xl flex items-center gap-3 animate-bounce z-50">
            <p id="prompt-text" class="text-[10px] font-black text-slate-800 dark:text-slate-100 uppercase tracking-tight">Tiếp theo: Tầng X</p>
            <button id="btn-switch-floor" class="bg-orange-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-black shadow-lg">CHUYỂN TẦNG</button>
        </div>
    </main>

    <!-- ADMIN LOGIN MODAL -->
    <div id="login-modal" class="hidden fixed inset-0 z-[300] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-2xl w-full max-w-xs text-center space-y-4 border dark:border-slate-800">
            <h2 class="text-xs font-black uppercase text-slate-800 dark:text-slate-100 tracking-wider">Xác thực Quản trị</h2>
            <input id="admin-password" type="password" placeholder="Mật khẩu" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border rounded-xl text-center outline-none focus:ring-2 focus:ring-indigo-500 font-bold tracking-widest text-slate-800 dark:text-slate-100">
            <div class="flex gap-2">
                <button id="btn-login-cancel" class="flex-1 py-2 text-slate-400 text-xs font-bold hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg">Hủy</button>
                <button id="btn-login-confirm" class="flex-1 py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg shadow-md">OK</button>
            </div>
        </div>
    </div>

    <!-- PROPERTIES PANEL -->
    <div id="props-panel" class="hidden absolute bottom-24 right-4 md:top-4 md:right-4 w-[280px] bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border dark:border-slate-800 p-4 space-y-4 z-[160]">
        <div class="flex justify-between items-center border-b pb-2 dark:border-slate-800">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Cấu hình Điểm</span>
            <button id="btn-close-props" class="text-slate-300 hover:text-slate-600">✕</button>
        </div>
        <div class="space-y-1">
            <label class="text-[9px] font-bold text-slate-400 uppercase">Tên Node/Phòng</label>
            <input id="node-label-input" type="text" class="w-full p-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-xs font-bold outline-none">
        </div>
        <div class="space-y-1">
            <label class="text-[9px] font-bold text-slate-400 uppercase">Khoa / Phòng Ban</label>
            <input id="node-dept-input" type="text" placeholder="Ví dụ: Công nghệ thông tin" class="w-full p-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-xs outline-none">
        </div>
        <div class="space-y-2">
            <label class="text-[9px] font-bold text-slate-400 uppercase">Phân loại & Định dạng màu</label>
            <div class="grid grid-cols-2 gap-1.5">
                <button id="btn-type-classroom" class="type-opt p-2 border rounded-lg text-[9px] font-black text-left">🟢 PHÒNG HỌC</button>
                <button id="btn-type-office" class="type-opt p-2 border rounded-lg text-[9px] font-black text-left">🟣 VĂN PHÒNG</button>
                <button id="btn-type-service" class="type-opt p-2 border rounded-lg text-[9px] font-black text-left">🟡 DỊCH VỤ</button>
                <button id="btn-type-emergency" class="type-opt p-2 border rounded-lg text-[9px] font-black text-left">🔴 KHẨN CẤP</button>
                <button id="btn-type-waypoint" class="type-opt p-2 border rounded-lg text-[9px] font-black text-left col-span-2">⚪ ĐIỂM NỐI TRUNG GIAN</button>
            </div>
        </div>
        <div class="space-y-2">
            <label class="text-[9px] font-bold text-slate-400 uppercase">Biểu tượng chức năng</label>
            <div class="grid grid-cols-4 gap-1">
                <button data-icon="🚻" class="icon-opt border p-1 rounded text-center text-xs">🚻</button>
                <button data-icon="☕" class="icon-opt border p-1 rounded text-center text-xs">☕</button>
                <button data-icon="📚" class="icon-opt border p-1 rounded text-center text-xs">📚</button>
                <button data-icon="🛗" class="icon-opt border p-1 rounded text-center text-xs">🛗</button>

    function removeVietnameseTones(str) {
        str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
        str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
        str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
        str = str.replace(/ò|ó|ọ|ỏ|ã|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
        str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
        str = str.replace(/ỳ|á|ỵ|ỷ|ỹ/g, "y");
        str = str.replace(/đ/g, "d");
        return str.toLowerCase().trim();
    }

    function normalizeTypo(str) {
        if (!str) return "";
        let text = removeVietnameseTones(str).replace(/[\s\.-]/g, '');
        if (text === 'thuvien') return 'thư viện';

        if (text === 'hoitruonga') return 'hội trường a';
        return text;

    // BFS HELPER FOR SMART SHORTEST PATH FINDING
    function findShortestPath(startId, targetIdOrPredicate) {
        let q = [[startId]], visited = new Set();
        while(q.length > 0) {
            const path = q.shift();
            const currId = path[path.length - 1];
            const currNode = nodes[currId];
            if (!currNode) continue;

            const isTarget = typeof targetIdOrPredicate === 'function' 
                ? targetIdOrPredicate(currNode) 
                : currId === targetIdOrPredicate;

            if (isTarget) return path;

            if (!visited.has(currId)) {
                visited.add(currId);
                const conns = currNode.connections || [];
                conns.forEach(nId => {
                    if (nodes[nId] && nodes[nId].floor === currNode.floor) {
                        if (routingPref === 'elevator' && nodes[nId].type === 'stairs') return;
                        q.push([...path, nId]);
                    }
                });
            }
        }
        return null;
    }

    // ADVANCED MULTI-FLOOR ROUTING ALGORITHM (COUPLED VERTICAL SHAFT MECHANISM)
    function calculateAdvancedRoute(s, e) {
        const S = nodes[s];
        const E = nodes[e];
        if(!S || !E) return;

        crossFloorRouting = null;

        if (S.floor === E.floor) {
            // Định tuyến cùng một tầng đơn thuần
            route = findShortestPath(s, e) || [];
            renderEdges(); 
            renderNodes(); 
            checkNextFloorPrompt();
            autoFocusRoute();
        } else {
            // Định tuyến ĐA TẦNG qua hệ thống liên trục thẳng đứng (Staircase Shaft Coupling)
            // Bước 1: Tìm kiếm tất cả các đầu nối trung chuyển (thang bộ / thang máy) trên tầng xuất phát
            const transitionCandidates = Object.values(nodes).filter(node => 
                node.floor === S.floor && 
                (node.type === 'stairs' || node.type === 'elevator')
            );

            let bestLeg1 = null;
            let bestLeg2 = null;
            let bestTotalLength = Infinity;
            let bestStartTransitionId = null;
            let bestEndTransitionId = null;

            // Bước 2: Duyệt từng thang để tìm ra thang bộ phù hợp nhất giúp tối ưu hóa tổng quãng đường
            transitionCandidates.forEach(tStartNode => {
                // Tìm kiếm thang tương ứng trên tầng đích có cùng loại (stairs/elevator)
                const targetTransitions = Object.values(nodes).filter(node => 
                    node.floor === E.floor && 
                    node.type === tStartNode.type
                );

                if (targetTransitions.length === 0) return;

                // Đồng bộ chính xác thang ở tầng trên thông qua cự ly tọa độ hình chiếu XY ngắn nhất (Vertical Shaft Matcher)
                let bestTargetNode = null;
                let minDistance = Infinity;

                targetTransitions.forEach(tEndNode => {
                    const dx = tStartNode.x - tEndNode.x;
                    const dy = tStartNode.y - tEndNode.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDistance) {
                        minDistance = dist;
                        bestTargetNode = tEndNode;
                    }
                });

                if (!bestTargetNode) return;

                // Tính toán lộ trình định tuyến thử cho trục thang đã chọn
                const leg1 = findShortestPath(s, tStartNode.id);
                const leg2Reverse = findShortestPath(e, bestTargetNode.id);
                const leg2 = leg2Reverse ? [...leg2Reverse].reverse() : null;

                if (leg1 && leg2) {
                    const totalLength = leg1.length + leg2.length;
                    if (totalLength < bestTotalLength) {
                        bestTotalLength = totalLength;
                        bestLeg1 = leg1;
                        bestLeg2 = leg2;
                        bestStartTransitionId = tStartNode.id;
                        bestEndTransitionId = bestTargetNode.id;
                    }
                }
            });

            if (bestLeg1 && bestLeg2) {
                // Thiết lập liên kết đa tầng đồng nhất
                crossFloorRouting = {
                    startFloor: S.floor,
                    endFloor: E.floor,
                    transitionStartId: bestStartTransitionId,
                    transitionEndId: bestEndTransitionId,
                    leg1: bestLeg1,
                    leg2: bestLeg2
                };

                updateActiveRouteLeg();
                renderEdges();
                renderNodes();
                checkNextFloorPrompt();
                autoFocusRoute();
            } else {
                showMsg("Không tìm thấy đường nối đa tầng qua cầu thang bộ/thang máy phù hợp!", false);
                route = [];
                renderEdges();
                renderNodes();
            }
        }
    }

    function updateActiveRouteLeg() {
        if (crossFloorRouting) {
            if (currentFloorId === crossFloorRouting.startFloor) {
                route = crossFloorRouting.leg1;
            } else if (currentFloorId === crossFloorRouting.endFloor) {
                route = crossFloorRouting.leg2;
            } else {
                route = [];
            }
        }
    }

    function applyTransform() { 
        mapContainer.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale}) rotate(${view.rotation}deg)`; 
    }

    function setupInitialView() {
        const sidebarWidth = (window.innerWidth >= 768 && !sidebar.classList.contains('-translate-x-full')) ? sidebar.clientWidth : 0;
        const vW = viewport.clientWidth;
        const vH = viewport.clientHeight;
        const visibleWidth = vW - sidebarWidth;
        const pad = 40;
        const sX = (visibleWidth - pad) / MAP_WIDTH;
        const sY = (vH - pad) / MAP_HEIGHT;
        view.scale = Math.min(sX, sY, 1);
        view.x = sidebarWidth + (visibleWidth - MAP_WIDTH * view.scale) / 2;
        view.y = (vH - MAP_HEIGHT * view.scale) / 2;
        applyTransform();
        renderNodes();
    }

    // AUTO ZOOM WITH CENTER VIEWPORT OFFSET
    function autoFocusRoute() {
        if(route.length === 0) return;
        const currentFloorNodes = route.map(id => nodes[id]).filter(n => n && n.floor === currentFloorId);
        if(currentFloorNodes.length === 0) return;

        let minX = MAP_WIDTH, maxX = 0, minY = MAP_HEIGHT, maxY = 0;
        currentFloorNodes.forEach(n => {
            if(n.x < minX) minX = n.x; if(n.x > maxX) maxX = n.x;
            if(n.y < minY) minY = n.y; if(n.y > maxY) maxY = n.y;
        });

        const midX = (minX + maxX) / 2;
        const midY = (minY + maxY) / 2;

        const sidebarWidth = (window.innerWidth >= 768 && !sidebar.classList.contains('-translate-x-full')) ? sidebar.clientWidth : 0;
        const vW = viewport.clientWidth;
        const vH = viewport.clientHeight;
        const visibleWidth = vW - sidebarWidth;

        const routeW = Math.max(maxX - minX, 100);
        const routeH = Math.max(maxY - minY, 100);
        const scaleX = (visibleWidth - 80) / routeW;
        const scaleY = (vH - 240) / routeH; 
        
        view.scale = Math.min(scaleX, scaleY, 2.2);
        view.x = sidebarWidth + (visibleWidth / 2) - midX * view.scale;
        view.y = (vH / 2) - midY * view.scale;
        
        applyTransform();
        renderNodes();
    }

    function focusSingleNode(node) {
        if (!node) return;
        const sidebarWidth = (window.innerWidth >= 768 && !sidebar.classList.contains('-translate-x-full')) ? sidebar.clientWidth : 0;
        const vW = viewport.clientWidth;
        const vH = viewport.clientHeight;
        const visibleWidth = vW - sidebarWidth;

        view.scale = 2.0;
        view.x = sidebarWidth + (visibleWidth / 2) - node.x * view.scale;
        view.y = (vH / 2) - node.y * view.scale;
        applyTransform();
        renderNodes();
    }

    function updateUI() {

        const areas = [...new Set(floors.map(f => f.area))];
        areas.forEach((area, index) => {

            const groupDiv = document.createElement('div');
            groupDiv.className = "bg-slate-50 dark:bg-slate-800/40 rounded-xl overflow-hidden border border-slate-100 dark:border-slate-800";
            
            groupDiv.innerHTML = `
                <button class="w-full flex items-center justify-between p-3 text-left font-black text-[10px] text-slate-700 dark:text-slate-300 uppercase tracking-wide bg-slate-100/70 dark:bg-slate-800/80">

                    <span class="transform transition-transform text-[8px] ${isCurrentArea ? 'rotate-180' : ''}">▼</span>
                </button>
                <div class="accordion-content ${isCurrentArea ? 'block' : 'hidden'} p-1 space-y-1"></div>
            `;

            const btnHeader = groupDiv.querySelector('button');
            const contentDiv = groupDiv.querySelector('.accordion-content');

            btnHeader.onclick = () => {
                const isHidden = contentDiv.classList.contains('hidden');
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.add('hidden'));
                groupDiv.parentNode.querySelectorAll('button span:last-child').forEach(s => s.classList.remove('rotate-180'));
                
                if(isHidden) {
                    contentDiv.classList.remove('hidden');
                    btnHeader.querySelector('span:last-child').classList.add('rotate-180');
                } else {
                    contentDiv.classList.add('hidden');
                }
            };

            floors.filter(f => f.area === area).forEach(f => {
                const fBtn = document.createElement('button');
                fBtn.className = `w-full flex items-center justify-between p-2.5 rounded-lg text-[10px] font-bold uppercase transition-all ${currentFloorId === f.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50'}`;

                contentDiv.appendChild(fBtn);
            });

            accordionContainer.appendChild(groupDiv);
        });
        
        const currentFloor = floors.find(x => x.id === currentFloorId);
        if (mapImage.getAttribute('src') !== currentFloor.image) {
            mapImage.src = currentFloor.image;
        }

        updateActiveRouteLeg();
        renderNodes(); 
        renderEdges(); 
        updateSelectOptions(); 
        checkNextFloorPrompt();
    }

    window.changeFloor = (id) => { 
        currentFloorId = id; 
        updateUI(); 
    };

    function buildQrLocationSelector() {
        const qrSelector = document.getElementById('qr-location-selector');
        const oldVal = qrSelector.value;
        qrSelector.innerHTML = '';
        
        // Loại bỏ hoàn toàn các điểm nối waypoint khỏi danh sách checkin để không bị rối mắt
        const checkInNodes = Object.values(nodes).filter(n => n.label && n.type !== 'waypoint');
        
        floors.forEach(f => {
            const floorNodes = checkInNodes.filter(n => n.floor === f.id);
            if(floorNodes.length > 0) {
                const group = document.createElement('optgroup');
                group.label = `${f.area.toUpperCase()} - ${f.name.toUpperCase()}`;
                floorNodes.forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = n.id;
                    opt.innerText = (n.customIcon ? n.customIcon + " " : "📍 ") + n.label.toUpperCase();
                    group.appendChild(opt);
                });
                qrSelector.appendChild(group);
            }
        });

        if (oldVal && qrSelector.querySelector(`option[value="${oldVal}"]`)) {
            qrSelector.value = oldVal;
        } else if (qrSelector.options.length > 0) {
            selectStart.value = qrSelector.value;
        }
    }

    function updateSelectOptions() {
        // Loại bỏ hoàn toàn các điểm nối trung gian (waypoint) khỏi thanh lựa chọn định tuyến
        const locations = Object.values(nodes).filter(n => n.label && n.type !== 'waypoint');
        let optionsHtml = '<option value="">-- CHỌN VỊ TRÍ --</option>';
        
        floors.forEach(f => {
            const nodesInFloor = locations.filter(n => n.floor === f.id).sort((a, b) => a.label.localeCompare(b.label));
            if (nodesInFloor.length > 0) {
                optionsHtml += `<optgroup label="--- ${f.area.toUpperCase()} - ${f.name.toUpperCase()} ---">`;
                nodesInFloor.forEach(n => {
                    optionsHtml += `<option value="${n.id}">${n.label.toUpperCase()}</option>`;
                });
                optionsHtml += `</optgroup>`;
            }
        });

        const sVal = selectStart.value, eVal = selectEnd.value;
        selectStart.innerHTML = optionsHtml; selectEnd.innerHTML = optionsHtml;
        if(nodes[sVal]) selectStart.value = sVal; if(nodes[eVal]) selectEnd.value = eVal;
    }

    // DYNAMIC SEMANTIC ZOOM & PIN DILUTION ENGINE
    function renderNodes() {
        nodesLayer.innerHTML = '';
        const isRouteActive = route.length > 0;
        const scale = view.scale;

        if (!isAdmin && isRouteActive) {
            mapImage.classList.add('dimmed-map');
        } else {
            mapImage.classList.remove('dimmed-map');
        }

        Object.values(nodes).filter(n => n.floor === currentFloorId).forEach(node => {
            const isSelected = selectedId === node.id;
            const isNavStart = selectStart.value === node.id;
            const isNavEnd = selectEnd.value === node.id;
            const isPartOfRoute = route.includes(node.id);

            if (!isAdmin && node.type === 'waypoint') return;

            // Semantic rules to hide/dilute clutter based on Zoom factor & Route State
            let showThisNode = false;
            let showLabel = false;

            if (isAdmin) {
                showThisNode = true;
                showLabel = true;
            } else if (isRouteActive) {
                // When routing: ONLY show Start, End, or key landmarks on path
                if (isNavStart || isNavEnd) {
                    showThisNode = true;
                    showLabel = true;
                } else if (isPartOfRoute && (node.type === 'stairs' || node.type === 'elevator' || node.customIcon)) {
                    showThisNode = true;
                    showLabel = true;
                }
            } else {
                // Free Browsing: Semantic Zoom Hierarchy
                if (node.type === 'classroom' || node.type === 'office') {
                    // Show minor rooms ONLY on high zoom
                    if (scale >= 1.4) {
                        showThisNode = true;
                        showLabel = true;
                    }
                } else if (node.type === 'service' || node.type === 'emergency' || node.customIcon) {
                    // Show restrooms, lifts, exits on medium zoom
                    showThisNode = true;
                    showLabel = scale >= 1.1;
                } else {
                    // Show major structural landmarks always
                    if (node.label && (node.label.includes("KHU") || node.label.includes("CỔNG") || node.label.includes("CONG") || node.label.includes("SÂN") || node.label.includes("CANTIN") || node.label.includes("KTX"))) {
                        showThisNode = true;
                        showLabel = true;
                    }
                }
            }

            if (!showThisNode) return;

            const div = document.createElement('div');
            let stateClass = isSelected ? 'ring-4 ring-indigo-500' : '';
            if (isNavStart) stateClass += ' current-loc-pulse';

            div.className = `node-ui absolute flex flex-col items-center z-20 ${stateClass}`;
            div.style.left = `${node.x}px`; div.style.top = `${node.y}px`;
            div.style.transform = `translate(-50%, -50%) rotate(${-view.rotation}deg)`; 

            // Standard category colors
            let color = 'bg-slate-400';
            if (node.type === 'classroom') color = 'cat-classroom';
            else if (node.type === 'office') color = 'cat-office';
            else if (node.type === 'service') color = 'cat-service';
            else if (node.type === 'emergency') color = 'cat-emergency';

            if (isNavStart) color = 'bg-emerald-500 ring-4 ring-emerald-100 dark:ring-emerald-950';
            if (isNavEnd) color = 'bg-orange-500 ring-4 ring-orange-100 dark:ring-orange-950 animate-bounce';

            // Thay đổi kích thước icon stairs / elevator khi đang dẫn đường để dễ ấn
            let size = isNavStart || isNavEnd ? 22 : (isPartOfRoute && (node.type === 'stairs' || node.type === 'elevator') ? 20 : (scale >= 1.6 ? 14 : 10));
            
            // THAY ĐỔI: Sử dụng Icon người đi bộ (🚶) hoặc biểu tượng định vị đặc biệt khi check-in thay vì chấm tròn đơn điệu
            let displayIcon = node.customIcon || "📍";
            if (isNavStart) displayIcon = "🚶"; // Đã đổi 🟢 thành 🚶 để người dùng không bị lộn
            if (isNavEnd) displayIcon = "🎯";

            // If zooming out, draw small clean dots instead of full icons
            const useMiniDot = !isNavStart && !isNavEnd && !isPartOfRoute && scale < 1.3;

            div.innerHTML = useMiniDot ? `
                <div class="rounded-full border border-white dark:border-slate-900 ${color} shadow-md hover:scale-125 transition-transform" style="width: 8px; height: 8px;"></div>
                ${showLabel && node.label ? `<div class="map-label mt-0.5">${node.label.toUpperCase()}</div>` : ''}
            ` : `
                <div class="rounded-full border-2 border-white dark:border-slate-900 ${color} flex items-center justify-center shadow-lg text-white font-bold hover:scale-110 transition-transform" style="width: ${size}px; height: ${size}px; font-size: ${size * 0.5}px;">
                    ${displayIcon}
                </div>
                ${showLabel && node.label ? `
                    <div class="map-label mt-1 text-center">
                        ${isNavStart ? '<span class="text-[7px] text-emerald-500 block uppercase tracking-tighter font-extrabold">BẠN Ở ĐÂY</span>' : ''}
                        ${node.label.toUpperCase()}
                    </div>
                ` : ''}
            `;

            // Admin drag logic
            let sX, sY, hM = false, startNodeX, startNodeY;
            const onS = (cX, cY) => {
                if (!isAdmin) return;
                sX = cX; sY = cY; hM = false;
                startNodeX = nodes[node.id].x; startNodeY = nodes[node.id].y;

                const onM = (me) => {
                    const curX = me.touches ? me.touches[0].clientX : me.clientX;
                    const curY = me.touches ? me.touches[0].clientY : me.clientY;
                    if (Math.abs(curX - sX) > 2 || Math.abs(curY - sY) > 2) {
                        if (mode === 'select') {
                            hM = true; div.classList.add('dragging');
                            let dx = (curX - sX) / view.scale, dy = (curY - sY) / view.scale;
                            const rad = -view.rotation * (Math.PI / 180);
                            nodes[node.id].x = startNodeX + (dx * Math.cos(rad) - dy * Math.sin(rad));
                            nodes[node.id].y = startNodeY + (dx * Math.sin(rad) + dy * Math.cos(rad));
                            div.style.left = `${nodes[node.id].x}px`; div.style.top = `${nodes[node.id].y}px`;
                            renderEdges();
                        }
                    }
                };
                const onE = () => {
                    window.removeEventListener('mousemove', onM); window.removeEventListener('mouseup', onE);
                    window.removeEventListener('touchmove', onM); window.removeEventListener('touchend', onE);
                    if (hM) { div.classList.remove('dragging'); saveData(true); } else handleNodeClick(node.id);
                };
                window.addEventListener('mousemove', onM); window.addEventListener('mouseup', onE);
                window.addEventListener('touchmove', onM, {passive:false}); window.addEventListener('touchend', onE);
            };

            div.onmousedown = (e) => { e.stopPropagation(); onS(e.clientX, e.clientY); };
            div.ontouchstart = (e) => { e.stopPropagation(); onS(e.touches[0].clientX, e.touches[0].clientY); };
            div.onclick = (e) => { e.stopPropagation(); handleNodeClick(node.id); };
            nodesLayer.appendChild(div);
        });
    }

    function renderEdges() {
        svgLayer.innerHTML = '';
        const isDarkMode = document.getElementById('app-root').classList.contains('dark-mode');
        
        if (isAdmin) {
            edges.forEach(edge => {
                const n1 = nodes[edge[0]], n2 = nodes[edge[1]];
                if (n1 && n2 && n1.floor === currentFloorId && n2.floor === currentFloorId) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", n1.x); line.setAttribute("y1", n1.y);
                    line.setAttribute("x2", n2.x); line.setAttribute("y2", n2.y);
                    line.setAttribute("stroke", isDarkMode ? "#334155" : "#e2e8f0"); 
                    line.setAttribute("stroke-width", "1.5");
                    line.setAttribute("stroke-dasharray", "3");
                    svgLayer.appendChild(line);
                }
            });
        }
        
        for (let i = 0; i < route.length - 1; i++) {
            const n1 = nodes[route[i]], n2 = nodes[route[i+1]];
            if (n1 && n2 && n1.floor === currentFloorId && n2.floor === currentFloorId) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", n1.x); line.setAttribute("y1", n1.y);
                line.setAttribute("x2", n2.x); line.setAttribute("y2", n2.y);
                line.setAttribute("stroke", "#f97316"); line.setAttribute("stroke-width", "4");
                line.setAttribute("stroke-linecap", "round"); line.setAttribute("class", "route-line");
                svgLayer.appendChild(line);
            }
        }
    }

    // INTERACTIVE NODE CLICKS (SMART INSTANT PATHFINDING)
    function handleNodeClick(id) {
        const node = nodes[id]; if(!node) return;
        if (isAdmin) {
            if (mode === 'select') { selectedId = id; propsPanel.classList.remove('hidden'); updatePropsUI(); } 
            else if (mode === 'connect') {
                if (selectedId && selectedId !== id) { toggleEdge(selectedId, id); selectedId = id; } else selectedId = id;
            }
            renderNodes();
        } else {
            // Khi người dùng click trực tiếp vào cầu thang/thang máy đang là điểm tiếp theo trên lộ trình
            if (crossFloorRouting && (id === crossFloorRouting.transitionStartId || id === crossFloorRouting.transitionEndId)) {
                const targetFloorId = (currentFloorId === crossFloorRouting.startFloor) ? crossFloorRouting.endFloor : crossFloorRouting.startFloor;
                window.changeFloor(targetFloorId);
                showMsg(`Đã di chuyển thang lên ${floors.find(f => f.id === targetFloorId).name.toUpperCase()}`);
                return;
            }

            if (node.type !== 'waypoint') {
                const currentCheckIn = document.getElementById('qr-location-selector').value;
                if (!selectStart.value && currentCheckIn) {
                    selectStart.value = currentCheckIn;
                }

                if (!selectStart.value) {
                    selectStart.value = id;
                    document.getElementById('qr-location-selector').value = id;
                    showMsg("Điểm bắt đầu: " + node.label);
                    focusSingleNode(node);
                } else if (selectStart.value === id) {
                    showMsg("Bạn đã ở vị trí này rồi!", false);
                } else {
                    selectEnd.value = id;
                    showMsg("Đang vẽ tuyến đường đến: " + node.label);
                    document.getElementById('btn-find-path').click();
                }
                renderNodes();
            }
        }
    }

    function toggleEdge(id1, id2) {
        const idx = edges.findIndex(e => (e[0]===id1 && e[1]===id2) || (e[0]===id2 && e[1]===id1));
        if(idx !== -1) edges.splice(idx, 1); else edges.push([id1, id2]);
        renderEdges();
    }

    // CONDITIONAL ROUTING DETAILS HUD
    function showRouteSummaryUI(destId) {
        const destNode = nodes[destId];
        if(!destNode) return;

        routeSummaryCard.classList.remove('hidden');
        quickActionsBar.classList.add('translate-y-24', 'opacity-0', 'pointer-events-none'); // Hide actions to save space
        document.getElementById('route-summary-dest').innerText = destNode.label.toUpperCase();
        
        let totalNodesCount = route.length;
        if (crossFloorRouting) {
            totalNodesCount = crossFloorRouting.leg1.length + crossFloorRouting.leg2.length;
        }
        const steps = Math.round(totalNodesCount * 12);
        document.getElementById('route-summary-steps').innerText = `~${steps} bước`;

        const fastSwitchBtn = document.getElementById('btn-route-switch-floor-fast');
        if (crossFloorRouting && currentFloorId === crossFloorRouting.startFloor) {
            fastSwitchBtn.classList.remove('hidden');
            const targetFloor = floors.find(f => f.id === crossFloorRouting.endFloor);
            fastSwitchBtn.innerText = `BẤM LÊN ${targetFloor.name.toUpperCase()} (${targetFloor.area.toUpperCase()})`;
            fastSwitchBtn.onclick = () => {
                window.changeFloor(crossFloorRouting.endFloor);
                showMsg(`Đã lên ${targetFloor.name} - Đi tiếp đến phòng đích!`);
            };
        } else {
            fastSwitchBtn.classList.add('hidden');
        }
    }

    function hideRouteSummaryUI() {
        routeSummaryCard.classList.add('hidden');
        quickActionsBar.classList.remove('translate-y-24', 'opacity-0', 'pointer-events-none');
    }

    function checkNextFloorPrompt() {
        const p = document.getElementById('next-floor-prompt');
        if (crossFloorRouting && currentFloorId === crossFloorRouting.startFloor) {
            p.classList.remove('hidden');
            const targetFloor = floors.find(f => f.id === crossFloorRouting.endFloor);
            const stairsName = nodes[crossFloorRouting.transitionStartId]?.label || "CẦU THANG";
            document.getElementById('prompt-text').innerText = `TIẾP THEO: LÊN TẦNG QUA [${stairsName}]`;
            document.getElementById('btn-switch-floor').onclick = () => {
                window.changeFloor(crossFloorRouting.endFloor);
            };
        } else {
            p.classList.add('hidden');
        }
    }

    function updatePropsUI() {
        const node = nodes[selectedId]; if(!node) return;
        document.getElementById('node-label-input').value = node.label || "";
        document.getElementById('node-dept-input').value = node.dept || "";
        
        document.querySelectorAll('.type-opt').forEach(btn => {
            const t = btn.id.replace('btn-type-', '');
            btn.className = `type-opt p-2 border rounded-lg text-[9px] font-black text-left transition-all ${node.type === t ? 'bg-indigo-600 text-white border-indigo-700' : 'bg-white dark:bg-slate-800 text-slate-400 border-slate-200 dark:border-slate-700'}`;
        });

        document.querySelectorAll('.icon-opt').forEach(btn => {
            const icon = btn.dataset.icon;
            btn.className = `icon-opt border p-1 rounded text-center text-xs transition-all ${node.customIcon === icon ? 'bg-orange-500 text-white' : 'bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300'}`;
        });
    }

    // SMART AUTO-COMPLETE SEARCH LOGIC
    searchInput.oninput = (e) => {
        const rawValue = e.target.value;
        const value = normalizeTypo(rawValue);
        const clearBtn = document.getElementById('clear-search-btn');

        if(value.length > 0) clearBtn.classList.remove('hidden');
        else { clearBtn.classList.add('hidden'); suggestionsBox.classList.add('hidden'); return; }

        const matchNodes = Object.values(nodes || {}).filter(n => {
            if(!n || !n.label) return false;
            // Chặn hoàn toàn các điểm nối trung gian (waypoint) xuất hiện trong kết quả tự động gợi ý tìm kiếm
            if(n.type === 'waypoint') return false; 
            const labelNorm = normalizeTypo(n.label);
            const deptNorm = normalizeTypo(n.dept || '');
            const typeNorm = normalizeTypo(n.type || '');
            return labelNorm.includes(value) || deptNorm.includes(value) || typeNorm.includes(value);
        });

        if(matchNodes.length > 0) {
            suggestionsBox.innerHTML = '';
            suggestionsBox.classList.remove('hidden');
            
            matchNodes.forEach(n => {
                const floorObj = floors.find(f => f.id === n.floor) || { area: "Khu", name: "Tầng" };
                const item = document.createElement('div');
                item.className = "p-3 border-b border-slate-100 dark:border-slate-800 last:border-none cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/80 flex justify-between items-center text-xs text-slate-800 dark:text-slate-200 font-bold transition-colors";
                item.innerHTML = `
                    <div class="pointer-events-none">
                        <p class="uppercase text-indigo-600 dark:text-indigo-400">${n.customIcon || '📍'} ${n.label}</p>
                        ${n.dept ? `<p class="text-[10px] text-slate-400 font-medium">${n.dept}</p>` : ''}
                    </div>
                    <span class="text-[9px] bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded text-slate-500 uppercase font-black pointer-events-none">${floorObj.area} - ${floorObj.name}</span>
                `;
                item.onclick = (event) => {
                    event.stopPropagation();
                    selectEnd.value = n.id;
                    const fallbackStart = Object.keys(nodes).find(key => nodes[key].floor === n.floor && nodes[key].type !== 'waypoint') || '';
                    selectStart.value = document.getElementById('qr-location-selector').value || fallbackStart;
                    suggestionsBox.classList.add('hidden');
                    searchInput.value = n.label.toUpperCase();
                    
                    currentFloorId = n.floor;
                    updateUI();
                    
                    if(selectStart.value && selectStart.value !== n.id) {
                        document.getElementById('btn-find-path').click();
                    } else {
                        focusSingleNode(n);
                    }
                };
                suggestionsBox.appendChild(item);
            });
        } else {
            suggestionsBox.classList.add('hidden');
        }
    };

    document.getElementById('clear-search-btn').onclick = () => {
        searchInput.value = '';
        document.getElementById('clear-search-btn').classList.add('hidden');
        suggestionsBox.classList.add('hidden');
    };

    // PANNING & ZOOMING RENDERING LISTENERS
    const handleStart = (cX, cY) => { isPanning = true; lastMousePos = { x: cX, y: cY }; };
    const handleMove = (cX, cY) => {
        if (!isPanning) return;
        view.x += (cX - lastMousePos.x); view.y += (cY - lastMousePos.y);
        lastMousePos = { x: cX, y: cY }; applyTransform();
    };
    const handleEnd = () => { isPanning = false; lastTouchDist = 0; };

    viewport.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const nS = Math.min(Math.max(view.scale * delta, 0.1), 5);
        const mX = (e.clientX - view.x) / view.scale, mY = (e.clientY - view.y) / view.scale;
        view.x = e.clientX - mX * nS; view.y = e.clientY - mY * nS; view.scale = nS;
        applyTransform();
        renderNodes(); // Dynamic render on zoom
    };

    viewport.onmousedown = (e) => { 
        if(e.target.closest('.node-ui') || e.target.closest('aside') || e.target.closest('div.absolute') || e.target.closest('div.fixed')) return; 
        handleStart(e.clientX, e.clientY); 
    };
    window.onmousemove = (e) => { handleMove(e.clientX, e.clientY); };
    window.onmouseup = handleEnd;

    // Double-tap zoom gesture
    let lastTap = 0;
    viewport.addEventListener('touchend', (e) => {
        let currentTime = new Date().getTime();
        let tapLength = currentTime - lastTap;
        if (tapLength < 300 && tapLength > 0) {
            setupInitialView();
            e.preventDefault();
        }
        lastTap = currentTime;
    });

    viewport.addEventListener('touchstart', (e) => {
        if(e.target.closest('.node-ui') || e.target.closest('aside') || e.target.closest('div.absolute') || e.target.closest('div.fixed')) return;
        if (e.touches.length === 1) handleStart(e.touches[0].clientX, e.touches[0].clientY);
        else if (e.touches.length === 2) lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }, { passive: false });

    viewport.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        else if (e.touches.length === 2 && lastTouchDist > 0) {
            e.preventDefault();
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const delta = dist / lastTouchDist;
            const nS = Math.min(Math.max(view.scale * delta, 0.1), 5);
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            view.x = midX - ((midX - view.x) / view.scale) * nS;
            view.y = midY - ((midY - view.y) / view.scale) * nS;
            view.scale = nS; lastTouchDist = dist; 
            applyTransform();
            renderNodes();
        }
    }, { passive: false });
    viewport.addEventListener('touchend', handleEnd);

    // DARK MODE SYSTEM INTERACTIVE
    document.getElementById('toggle-dark-mode').onclick = () => {
        const root = document.getElementById('app-root');
        root.classList.toggle('dark');
        root.classList.toggle('dark-mode');
        renderEdges();
    };

    // FLOATING QUICK ACTIONS BAR
    document.querySelectorAll('.quick-action-btn').forEach(btn => {
        btn.onclick = () => {
            const type = btn.dataset.type;
            const availableNodes = Object.values(nodes).filter(n => n.customIcon === '🚻' && type === 'wc' || n.customIcon === '☕' && type === 'canteen' || n.customIcon === '📚' && type === 'library' || n.type === 'elevator' && type === 'elevator');
            
            if(availableNodes.length > 0) {
                let target = availableNodes.find(n => n.floor === currentFloorId) || availableNodes[0];
                currentFloorId = target.floor;
                selectEnd.value = target.id;
                selectStart.value = document.getElementById('qr-location-selector').value;
                updateUI();
                document.getElementById('btn-find-path').click();
                showMsg(`Định vị tới [${target.label}] gần nhất`);
            } else {
                showMsg("Chưa tìm thấy thiết bị dịch vụ này trên tầng!", false);
            }
        };
    });

    // SIDEBAR NAVIGATION & OVERLAYS INTERACTION
    document.getElementById('menu-trigger-btn').onclick = () => toggleSidebar(true);
    document.getElementById('close-sidebar-btn').onclick = () => toggleSidebar(false);
    sidebarOverlay.onclick = () => toggleSidebar(false);

    document.getElementById('quick-recenter-btn').onclick = () => setupInitialView();
    document.getElementById('btn-recenter').onclick = () => setupInitialView();
    
    document.getElementById('btn-rotate').onclick = () => {
        view.rotation = (view.rotation + 90) % 360; applyTransform(); renderNodes();
    };

    document.getElementById('qr-mock-btn').onclick = () => {
        const mockQrId = document.getElementById('qr-location-selector').value;
        if(mockQrId && nodes[mockQrId]) {
            selectStart.value = mockQrId;
            currentFloorId = nodes[mockQrId].floor;
            updateUI();
            focusSingleNode(nodes[mockQrId]);
            showMsg(`📲 Đã quét QR: Vị trí của bạn hiện tại đặt ở [${nodes[mockQrId].label.toUpperCase()}]`);
        }
    };

    // SMART QR/LOCATION SELECTOR DETECTOR & INTERACTIVE INSTANT ZOOM
    document.getElementById('qr-location-selector').onchange = (e) => {
        const selectedId = e.target.value;
        selectStart.value = selectedId;
        const startNode = nodes[selectedId];
        
        if (startNode) {
            currentFloorId = startNode.floor;
            updateUI();
            
            // If destination is already selected, instantly plot direction and center view
            if (selectEnd.value && selectEnd.value !== selectedId) {
                document.getElementById('btn-find-path').click();
            } else {
                focusSingleNode(startNode);
            }
        }
    };

    document.querySelectorAll('.pref-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.pref-btn').forEach(b => b.className = "pref-btn py-1.5 text-[9px] font-black uppercase rounded-lg transition-all text-slate-500");
            btn.className = "pref-btn py-1.5 text-[9px] font-black uppercase rounded-lg transition-all bg-white dark:bg-slate-800 text-indigo-600 shadow-sm";
            routingPref = btn.dataset.pref;
            if(selectStart.value && selectEnd.value) document.getElementById('btn-find-path').click();
        };
    });

    // ADMIN PRIVILEGES
    document.getElementById('secret-login-trigger').onclick = () => {
        loginClickCount++; if (loginClickCount >= 5) { loginModal.classList.remove('hidden'); loginClickCount = 0; }
    };
    document.getElementById('btn-login-confirm').onclick = () => {
        if(document.getElementById('admin-password').value === 'Nsg@2026') {
            isAdmin = true; loginModal.classList.add('hidden');
            document.getElementById('admin-tools').classList.remove('hidden'); updateUI();
        } else alert("Mật khẩu truy cập không chính xác!");
    };
    document.getElementById('btn-login-cancel').onclick = () => loginModal.classList.add('hidden');
    document.getElementById('btn-logout').onclick = () => { isAdmin = false; location.reload(); };

    document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.className = "tool-btn p-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-[9px] font-black uppercase");
            btn.className = "tool-btn p-2 rounded-xl border border-transparent bg-indigo-600 text-white text-[9px] font-black uppercase";
            mode = btn.dataset.mode; selectedId = null; propsPanel.classList.add('hidden'); renderNodes();
        };
    });

    document.getElementById('btn-save-all').onclick = () => { sanitizeConnections(); saveData(); };
    
    document.getElementById('btn-find-path').onclick = () => {
        const s = selectStart.value, e = selectEnd.value;
        if(!s || !e) return;
        activeStart = s; activeEnd = e;
        
        // Auto-close sidebar to maximize screen estate for zoom bounds
        toggleSidebar(false);
        
        saveData(true); 
        calculateAdvancedRoute(s, e);
        if (route.length === 0) { 
            showMsg("Không tìm thấy đường nối khả dụng!", false); 
        } else { 
            document.getElementById('btn-clear-path').classList.remove('hidden'); 
            showRouteSummaryUI(e);
        }
    };

    document.getElementById('btn-clear-path').onclick = () => {
        route = []; activeStart = null; activeEnd = null; 
        selectEnd.value = "";
        crossFloorRouting = null;
        document.getElementById('btn-clear-path').classList.add('hidden'); 
        hideRouteSummaryUI();
        saveData(true); 
        updateUI();
        setupInitialView();
    };

    document.getElementById('btn-cancel-route-fast').onclick = () => {
        document.getElementById('btn-clear-path').click();
    };

    document.getElementById('btn-close-props').onclick = () => { selectedId = null; propsPanel.classList.add('hidden'); renderNodes(); };
    
    document.getElementById('node-label-input').oninput = (e) => {
        if(selectedId) { nodes[selectedId].label = e.target.value.toUpperCase(); renderNodes(); updateSelectOptions(); saveData(true); }
    };
    document.getElementById('node-dept-input').oninput = (e) => {
        if(selectedId) { nodes[selectedId].dept = e.target.value; updateSelectOptions(); saveData(true); }
    };

    document.querySelectorAll('.type-opt').forEach(btn => {
        btn.onclick = () => {
            if(selectedId) {
                nodes[selectedId].type = btn.id.replace('btn-type-', '');
                updatePropsUI(); renderNodes(); updateSelectOptions(); saveData(true);
            }
        };
    });

    document.querySelectorAll('.icon-opt').forEach(btn => {
        btn.onclick = () => {
            if(selectedId) {
                nodes[selectedId].customIcon = btn.dataset.icon;
                updatePropsUI(); renderNodes(); buildQrLocationSelector(); saveData(true);
            }
        };
    });

    document.getElementById('btn-delete-node').onclick = () => {
        if(selectedId) {
            edges = edges.filter(e => e[0] !== selectedId && e[1] !== selectedId);
            delete nodes[selectedId]; selectedId = null; propsPanel.classList.add('hidden'); updateUI(); saveData(true);
        }
    };

    mapContainer.onclick = (e) => {
        if(isAdmin && mode === 'add' && !e.target.closest('.node-ui')) {
            const rect = mapContainer.getBoundingClientRect();
            const id = `n${Date.now()}_${Math.floor(Math.random()*1000)}`;
            nodes[id] = { id, x: (e.clientX - rect.left) / view.scale, y: (e.clientY - rect.top) / view.scale, label: "PHÒNG MỚI", dept: "", type: "waypoint", customIcon: "", floor: currentFloorId, connections: [] };
            saveData(true); updateUI();
        }
    };

    window.onload = () => {
        initCloudSync(); 
        setupInitialView();
        mapImage.onload = () => setupInitialView();
        window.onresize = () => setupInitialView();
    };
</script>
</body>
</html>
